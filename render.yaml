services:
  # ── NestJS Backend ──────────────────────────────────────────
  - type: web
    name: smartfinance-api
    runtime: node
    rootDir: backend
    buildCommand: npm ci && npm run build
    startCommand: node dist/main.js
    healthCheckPath: /auth/login
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false          # preencher manualmente no painel do Render
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true  # Render gera automaticamente
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: AI_SERVICE_URL
        sync: false          # preencher após deploy do serviço de IA
      - key: CORS_ORIGINS
        sync: false          # preencher com URL do Vercel após deploy do frontend

  # ── FastAPI AI Service ──────────────────────────────────────
  - type: web
    name: smartfinance-ai
    runtime: python
    rootDir: ai
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
