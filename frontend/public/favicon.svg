<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Fundo indigo arredondado -->
  <rect width="32" height="32" rx="8" fill="#4f46e5"/>
  <!-- Gráfico de linha ascendente -->
